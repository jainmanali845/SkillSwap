<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse People — SkillSwap</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>

<body class="app-page">
  <aside class="sidebar" id="sidebar">
    <a href="index.html" class="sidebar__logo">Skill<span>Swap</span></a>
    <nav class="sidebar__nav">
      <a href="dashboard.html" class="sidebar__link" data-nav-link>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
        </svg>
        Dashboard
      </a>
      <a href="profile.html" class="sidebar__link" data-nav-link>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        My Profile
      </a>
      <a href="browse.html" class="sidebar__link active" data-nav-link>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        Browse People
      </a>
      <hr class="sidebar__divider">
      <button class="sidebar__link" data-theme-toggle
        style="background:none;border:none;cursor:pointer;width:100%;text-align:left;">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
        Dark Mode
      </button>
    </nav>
    <div class="sidebar__user">
      <img class="sidebar__user-avatar" data-nav-avatar src="" alt="">
      <span class="sidebar__user-name" data-nav-name>User</span>
      <button class="sidebar__logout" data-logout title="Sign out">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </button>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div style="flex:1; min-width:0; display:flex; flex-direction:column;">
    <header class="topbar">
      <a href="index.html" class="topbar__logo">Skill<span>Swap</span></a>
      <div class="topbar__actions">
        <button class="theme-toggle" data-theme-toggle></button>
        <button class="hamburger" id="hamburger">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
      </div>
    </header>

    <main class="app-main">
      <div class="page-header">
        <h1>Browse People</h1>
        <p>Find your perfect skill-swap partner from our global community.</p>
      </div>
      <div class="browse-controls">
        <div class="browse-search-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input class="form__input" type="search" id="browse-search" placeholder="Search by name or skill…"
            autocomplete="off">
        </div>

        <div style="display:flex; align-items:center; gap: var(--space-sm);">
          <label class="label" for="filter-skill" style="white-space:nowrap;">Filter by skill:</label>
          <select class="form__input form__select" id="filter-skill" style="min-width:180px;">
            <option value="">All skills</option>
          </select>
        </div>
      </div>

      <!-- Users Grid -->
      <div class="users-grid" id="users-grid">
        <div class="empty-state">
          <p>Loading members…</p>
        </div>
      </div>

    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/main.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const hamburger = document.getElementById('hamburger');
    hamburger?.addEventListener('click', () => {
      const open = sidebar.classList.toggle('open');
      overlay.classList.toggle('active', open);
    });
    overlay?.addEventListener('click', () => {
      sidebar.classList.remove('open');
      overlay.classList.remove('active');
    });
  </script>
</body>

</html>
